<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一站式门户集合平台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-effects">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="7" height="7" rx="1"/>
                    <rect x="14" y="3" width="7" height="7" rx="1"/>
                    <rect x="3" y="14" width="7" height="7" rx="1"/>
                    <rect x="14" y="14" width="7" height="7" rx="1"/>
                </svg>
                <h1 class="logo-text">一站式门户集合平台</h1>
            </div>
            <div class="header-actions">
                <div class="search-wrapper">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/>
                        <path d="m21 21-4.35-4.35"/>
                    </svg>
                    <input type="text" id="searchInput" class="search-input" placeholder="搜索网站...">
                    <button id="clearSearch" class="clear-btn hidden">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M18 6 6 18M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
                <div class="theme-switcher">
                    <button class="theme-btn active" data-theme="default" title="暗紫主题">
                        <span class="theme-dot" style="background: linear-gradient(135deg, #6366f1, #8b5cf6);"></span>
                    </button>
                    <button class="theme-btn" data-theme="tech" title="科技感">
                        <span class="theme-dot" style="background: linear-gradient(135deg, #00d4ff, #0066ff);"></span>
                    </button>
                    <button class="theme-btn" data-theme="future" title="未来感">
                        <span class="theme-dot" style="background: linear-gradient(135deg, #ff00ff, #00ffff);"></span>
                    </button>
                    <button class="theme-btn" data-theme="spring" title="春日主题">
                        <span class="theme-dot" style="background: linear-gradient(135deg, #ff9a9e, #fad0c4);"></span>
                    </button>
                    <button class="theme-btn" data-theme="neon-shock" title="霓虹冲击">
                        <span class="theme-dot" style="background: linear-gradient(135deg, #39ff14, #ff1493);"></span>
                    </button>
                    <button class="theme-btn" data-theme="banana" title="蕉黄">
                        <span class="theme-dot" style="background: linear-gradient(135deg, #ffe135, #f5a623);"></span>
                    </button>
                    <button class="theme-btn" data-theme="tangerine" title="橘子迪斯科">
                        <span class="theme-dot" style="background: linear-gradient(135deg, #ff6b35, #00fa9a);"></span>
                    </button>
                    <button class="theme-btn" data-theme="clubroom" title="俱乐部反差">
                        <span class="theme-dot" style="background: linear-gradient(135deg, #d4af37, #ffd700);"></span>
                    </button>
                    <button class="theme-btn" data-theme="mermaid" title="美人鱼核">
                        <span class="theme-dot" style="background: linear-gradient(135deg, #7fdbda, #9b7fdb);"></span>
                    </button>
                    <button class="theme-btn" data-theme="creative" title="创意过程">
                        <span class="theme-dot" style="background: linear-gradient(135deg, #e07a5f, #81b29a);"></span>
                    </button>
                    <button class="theme-btn" data-theme="sunwashed" title="阳光洗褪">
                        <span class="theme-dot" style="background: linear-gradient(135deg, #d4a5a5, #9eb3c2);"></span>
                    </button>
                    <button class="theme-btn" data-theme="biography" title="生物图谱">
                        <span class="theme-dot" style="background: linear-gradient(135deg, #4dabf7, #69db7c);"></span>
                    </button>
                    <button class="theme-btn" data-theme="archival" title="档案索引">
                        <span class="theme-dot" style="background: linear-gradient(135deg, #d4c5a9, #8b7355);"></span>
                    </button>
                    <button class="theme-btn" data-theme="glass" title="玻璃态">
                        <span class="theme-dot" style="background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(255,255,255,0.5));"></span>
                    </button>
                </div>
            </div>
        </header>

        <!-- Category Tabs -->
        <nav class="tabs">
            <div class="tabs-list" id="tabsList">
                <button class="tab active" data-category="all">全部</button>
                <button class="tab" data-category="social">社交媒体</button>
                <button class="tab" data-category="video">影音娱乐</button>
                <button class="tab" data-category="shopping">电商购物</button>
                <button class="tab" data-category="dev">开发工具</button>
                <button class="tab" data-category="office">办公效率</button>
                <button class="tab" data-category="search">搜索引擎</button>
            </div>
            <div class="tab-indicator"></div>
        </nav>

        <!-- Portal Grid -->
        <main class="portal-grid" id="portalGrid">
            <!-- Cards will be injected by JavaScript -->
        </main>

        <!-- Empty State -->
        <div class="empty-state hidden" id="emptyState">
            <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <circle cx="11" cy="11" r="8"/>
                <path d="m21 21-4.35-4.35"/>
                <path d="M8 8l6 6M14 8l-6 6"/>
            </svg>
            <p class="empty-text">未找到匹配的网站</p>
            <p class="empty-hint">尝试其他关键词或切换分类</p>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p>一站式门户集合平台 &copy; 2026</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
